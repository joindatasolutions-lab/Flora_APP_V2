<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domicilios Operativo</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="domicilios-operativo.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-summary">
      <span class="topbar-title">Pedidos hoy</span>
      <strong id="statsCount" class="topbar-count">0</strong>
    </div>
    <button id="btnRefresh" type="button" class="btn btn-refresh">Actualizar</button>
  </header>

  <section class="chips-bar" aria-label="Filtros rápidos">
    <div class="chips-scroll">
      <button id="chipToday" class="filter-chip active" type="button" data-filter="today">Hoy</button>
      <button id="chipPending" class="filter-chip" type="button" data-filter="pending">Pendientes</button>
      <button id="chipEnRuta" class="filter-chip" type="button" data-filter="en-route">En ruta</button>
      <button id="chipDelivered" class="filter-chip" type="button" data-filter="delivered">Entregados</button>
    </div>
  </section>

  <section class="tabs-bar" role="tablist" aria-label="Cambiar vista">
    <button
      id="tab-lista"
      class="tab-button active"
      type="button"
      role="tab"
      aria-selected="true"
      aria-controls="panel-lista"
      data-view="list">Lista</button>
    <button
      id="tab-ruta"
      class="tab-button"
      type="button"
      role="tab"
      aria-selected="false"
      aria-controls="panel-ruta"
      data-view="route"
      tabindex="-1">Ruta</button>
    <button
      id="tab-mapa"
      class="tab-button"
      type="button"
      role="tab"
      aria-selected="false"
      aria-controls="panel-mapa"
      data-view="map"
      tabindex="-1">Mapa</button>
  </section>

  <main class="content-shell">
    <section id="panel-lista" class="view-panel is-active" role="tabpanel" aria-labelledby="tab-lista" aria-live="polite"></section>
    <section id="panel-ruta" class="view-panel" role="tabpanel" aria-labelledby="tab-ruta" hidden></section>
    <section id="panel-mapa" class="view-panel panel-map" role="tabpanel" aria-labelledby="tab-mapa" hidden></section>
  </main>

  <div class="floating-bar">
    <div class="floating-controls">
      <label class="floating-field" for="routeCourierSelect">
        <span>Domiciliario</span>
        <select id="routeCourierSelect" class="route-courier-select">
          <option value="">Selecciona un domiciliario</option>
        </select>
      </label>
      <button id="btnGenerateRoutes" type="button" class="btn btn-generate-routes">Generar rutas</button>
    </div>
  </div>

  <output id="toast" class="toast" aria-live="polite"></output>

  <script>
    globalThis.GOOGLE_MAPS_API_KEY = globalThis.GOOGLE_MAPS_API_KEY || '';
    globalThis.STORE_COORDS = globalThis.STORE_COORDS || { lat: 10.998455, lng: -74.806981 };
  </script>
  <script src="domicilios-operativo.js"></script>
</body>
</html>
